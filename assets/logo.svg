<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">relic.skill logo</title>
  <desc id="desc">Minimal R logo merged with chip elements.</desc>
  <defs>
    <linearGradient id="chipStroke" x1="104" y1="88" x2="408" y2="424" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b3451"/>
      <stop offset="1" stop-color="#29405f"/>
    </linearGradient>
    <linearGradient id="rStroke" x1="158" y1="116" x2="364" y2="376" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#6ae8ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="104" y="88" width="304" height="336" rx="52" fill="#0b1021" stroke="url(#chipStroke)" stroke-width="12"/>

