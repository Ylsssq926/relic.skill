<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">团队头像插画</title>
  <desc id="desc">暖色纸面背景中的三人协作头像，中间有电脑屏幕光，呈现深夜一起做事的感觉。</desc>
  <defs>
    <linearGradient id="paper" x1="24" y1="18" x2="294" y2="304" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF8F2"/>
      <stop offset="1" stop-color="#F1E8DC"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(252 82) rotate(138.743) scale(118.784 90.3656)">
      <stop stop-color="#F3C597" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#F3C597" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coolGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(82 86) rotate(21.8014) scale(116.682 81.5367)">
      <stop stop-color="#DCE7F0" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#DCE7F0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF5FA"/>
      <stop offset="1" stop-color="#D6E0EA"/>
    </linearGradient>
  </defs>

  <rect width="320" height="320" fill="url(#paper)"/>
